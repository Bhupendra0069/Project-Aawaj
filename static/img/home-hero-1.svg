<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title>Hexagon design pattern</title>
  <desc>Geometric hexagon pattern with transparent background.</desc>
  <defs>
    <pattern id="hexPattern" x="0" y="0" width="100" height="86.6" patternUnits="userSpaceOnUse">
      <polygon points="50,0 93.3,25 93.3,75 50,100 6.7,75 6.7,25" fill="none" stroke="#4f7ffa" stroke-width="2" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#hexPattern)"/>
  <g opacity="0.8">
    <polygon points="200,150 250,125 300,150 300,225 250,250 200,225" fill="#dbeafe" stroke="#4f7ffa" stroke-width="3"/>
    <polygon points="350,200 400,175 450,200 450,275 400,300 350,275" fill="#dbeafe" stroke="#4f7ffa" stroke-width="3"/>
    <polygon points="500,100 550,75 600,100 600,175 550,200 500,175" fill="#dbeafe" stroke="#4f7ffa" stroke-width="3"/>
    <polygon points="150,300 200,275 250,300 250,375 200,400 150,375" fill="#dbeafe" stroke="#4f7ffa" stroke-width="3"/>
    <polygon points="400,350 450,325 500,350 500,425 450,450 400,425" fill="#dbeafe" stroke="#4f7ffa" stroke-width="3"/>
  </g>
</svg>
