{% extends 'base.html' %}
{% load static %}
{% block title %}Moderation Panel - AAWAJ{% endblock %}
{% block content %}
<div class="container" style="padding-top:2rem;padding-bottom:4rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
        <div>
            <h1 class="section-title" style="margin-bottom:0.3rem;">Moderation Panel</h1>
            <p style="color:var(--text-secondary);">Review and moderate citizen complaints</p>
        </div>
        <div style="display:flex;gap:0.5rem;">
            <button class="filter-chip active" onclick="loadQueue('pending_review',this)">Pending</button>
            <button class="filter-chip" onclick="loadQueue('published',this)">Approved</button>
            <button class="filter-chip" onclick="loadQueue('rejected',this)">Rejected</button>
        </div>
    </div>
    <div class="stats-grid" style="margin-bottom:2rem;">
        <div class="stat-card glass-card"><div class="stat-number" id="mPending">0</div><div class="stat-label">Pending Review</div></div>
        <div class="stat-card glass-card"><div class="stat-number" id="mApproved">0</div><div class="stat-label">Approved</div></div>
        <div class="stat-card glass-card"><div class="stat-number" id="mRejected">0</div><div class="stat-label">Rejected</div></div>
        <div class="stat-card glass-card"><div class="stat-number" id="mToday">0</div><div class="stat-label">Today</div></div>
    </div>
    <div id="modQueue"><div class="spinner"></div></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:800px;">
        <div class="modal-header">
            <h2 id="modalTitle">Complaint Detail</h2>
            <button class="modal-close" onclick="closeModal()">x</button>
        </div>
        <div id="modalContent"><div class="spinner"></div></div>
        <div id="modalActions" style="display:flex;gap:1rem;margin-top:1.5rem;"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentFilter = 'pending_review';
document.addEventListener('DOMContentLoaded', () => loadQueue('pending_review'));

function loadQueue(status, el) {
    currentFilter = status;
    if (el) { document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }
    fetch('/api/moderation/queue/?status=' + status)
        .then(r => { if (r.status === 401) { window.location.href = '/login/'; return; } return r.json(); })
        .then(data => {
            if (!data) return;
            if (data.stats) {
                document.getElementById('mPending').textContent = data.stats.pending || 0;
                document.getElementById('mApproved').textContent = data.stats.published || 0;
                document.getElementById('mRejected').textContent = data.stats.rejected || 0;
                document.getElementById('mToday').textContent = data.stats.total_today || 0;
            }
            const items = data.complaints || [];
            const queue = document.getElementById('modQueue');
            if (!items.length) { queue.innerHTML = '<div class="glass-card" style="text-align:center;padding:3rem;color:var(--text-muted);">No complaints in this queue.</div>'; return; }
            queue.innerHTML = '<div style="display:flex;flex-direction:column;gap:1rem;">' + items.map(c => `
                <div class="glass-card" style="display:flex;gap:1.5rem;align-items:flex-start;padding:1.2rem;cursor:pointer;" onclick="showDetail(${c.id})">
                    <img src="${c.first_image || ''}" style="width:120px;height:90px;object-fit:cover;border-radius:10px;flex-shrink:0;background:var(--bg-glass);" onerror="this.style.display='none'">
                    <div style="flex:1;min-width:0;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;flex-wrap:wrap;gap:0.5rem;">
                            <span class="complaint-code">${c.complaint_code}</span>
                            <div style="display:flex;gap:0.4rem;">${categoryBadge(c.category)} ${priorityBadge(c.priority)}</div>
                        </div>
                        <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:0.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.description || 'No description'}</p>
                        <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-muted);">
                            <span>📍 ${(c.location_text||'').substring(0,40)}</span>
                            <span>AI: ${Math.round(c.ai_confidence_score*100)}% | Severity: ${c.ai_severity_score}/10</span>
                        </div>
                    </div>
                    ${currentFilter === 'pending_review' ? `<div style="display:flex;flex-direction:column;gap:0.5rem;flex-shrink:0;">
                        <button class="btn btn-success btn-sm" onclick="event.stopPropagation();modAction(${c.id},'approve')">Approve</button>
                        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();modAction(${c.id},'reject')">Reject</button>
                    </div>` : `<div>${statusBadge(c.status)}</div>`}
                </div>`).join('') + '</div>';
        }).catch(e => { document.getElementById('modQueue').innerHTML = '<p style="color:var(--danger);">Error loading queue.</p>'; });
}

function showDetail(id) {
    document.getElementById('detailModal').classList.add('active');
    fetch('/api/moderation/' + id + '/detail/')
        .then(r => r.json())
        .then(c => {
            document.getElementById('modalTitle').textContent = c.complaint_code;
            let imgs = (c.images||[]).map(i => `<img src="${i.image_url}" style="max-width:100%;border-radius:10px;margin-bottom:1rem;">`).join('');
            document.getElementById('modalContent').innerHTML = `
                ${imgs}
                <div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">${categoryBadge(c.category)} ${priorityBadge(c.priority)} ${statusBadge(c.status)}</div>
                <p style="margin-bottom:1rem;">${c.description||'No description'}</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                    <div><small style="color:var(--text-muted);">Location</small><br>${c.location_text}</div>
                    <div><small style="color:var(--text-muted);">AI Confidence</small><br>${Math.round(c.ai_confidence_score*100)}% — ${c.ai_verdict}</div>
                    <div><small style="color:var(--text-muted);">Severity</small><br>${c.ai_severity_score}/10 ${c.ai_urgency?'URGENT':''}</div>
                    <div><small style="color:var(--text-muted);">Submitted</small><br>${formatDate(c.created_at)}</div>
                </div>
                ${c.audio_files && c.audio_files.length ? '<div style="margin-bottom:1rem;"><small style="color:var(--text-muted);">Audio</small><br><audio controls src="'+c.audio_files[0].audio_url+'" style="width:100%;margin-top:0.5rem;"></audio><p style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.3rem;">Transcription: '+((c.audio_files[0].transcription)||'N/A')+'</p></div>' : ''}
            `;
            document.getElementById('modalActions').innerHTML = c.status === 'pending_review' ? `
                <button class="btn btn-success" onclick="modAction(${c.id},'approve');closeModal();">Approve</button>
                <button class="btn btn-danger" onclick="modAction(${c.id},'reject');closeModal();">Reject</button>
            ` : '';
        });
}

function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

async function modAction(id, action) {
    const notes = action === 'reject' ? (prompt('Rejection reason (optional):') || '') : '';
    try {
        const res = await fetch('/api/moderation/' + id + '/action/', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({ action, notes })
        });
        const data = await res.json();
        if (data.success) { showToast(data.message, 'success'); loadQueue(currentFilter); }
        else showToast(data.error || 'Action failed', 'error');
    } catch (e) { showToast('Network error', 'error'); }
}
</script>
{% endblock %}
